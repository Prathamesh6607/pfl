services:
  api:
    build: .
    container_name: loan-decision-api
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  celery_worker:
    build: .
    container_name: loan-decision-celery
    command: celery -A app.services.tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

  postgres:
    image: postgres:16
    container_name: loan-decision-postgres
    environment:
      POSTGRES_DB: loans
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: loan-decision-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
